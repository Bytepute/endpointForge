name: CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build and Push to GHCR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/bytepute/endpoint_forge_frontend:main
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
            VITE_APP_DOMAIN=${{ secrets.VITE_APP_DOMAIN }}
            VITE_APP_PORT=${{ secrets.VITE_APP_PORT }}
            VITE_APP_PROTOCOL=${{ secrets.VITE_APP_PROTOCOL }}
            VITE_DEV_DOMAIN=${{ secrets.VITE_DEV_DOMAIN }}

  deploy:
    name: Deploy to VPS
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |

            cd /home/deployer/app/endpointforge/frontend/

            # Pull the fresh image and recreate the container seamlessly
            docker compose pull
            docker compose up -d

            # Clean up old images to keep the SSD clear
            docker image prune -af
